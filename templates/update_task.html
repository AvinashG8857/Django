{% extends "base.html" %}
{% block content %}

<div class="card mina-card p-4 bg-white col-md-6 mx-auto">
    <h4 class="fw-cold b-4 text-center">Update Task</h4>
    <form action="" method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Task Title</label>
            <input type="text" name="title" value="{{ task.title|slice:':5' }}" class="from-control" placeholder="ENTER your task title" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Due Date</label>
            <input type="date" name="due_date" value="{{task.due_date|date:'Y-m-d'}}" class="from-control" required>
        </div>
        <div class="mb-4 form-check">
            <input type="checkbox" name= completed class="form-check-input" id="completedCheck"
            {% if task.completed %}checked{% endif %}>
            <label class="form-check-label fw-semibold" for="completedCheck">Mark as completed</label>

        </div>

        <div class="d-flax justify-content-between">
            <a href="{% url 'task_list' %}" class="btn btn-outline-secondary btn-custom">
                Back
            </a>

            <button type="submit" class="btn btn-primary btn-custom">
                Update Task
            </button>

        </div>
    </form>

</div>


{% endblock %}
