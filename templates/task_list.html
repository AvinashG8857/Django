{% extends "base.html" %}

{% block content %}

<div class="card mina-card p-4 bg-white">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">My Task</h4>
        <a href="{% url 'add_task' %}" class="btn btn-primary btn-custom">+ Add Task</a>
    </div>

    {% for task in tasks %}
    <div class="border rounded p-3 mb-3">

        <div class="d-flex justify-content-between">
            <div>
                <h6 class="{% if task.completed %}text-decoration-line-through text-muted{% endif %}">
                    {{ task.title }}
                </h6>
                <small class="text-muted">
                    Due: {{ task.due_date }}
                </small>
            </div>
        </div>

        <div class="mt-2">
            {% if task.completed %}
            <span class="badge bg-success">Completed</span>
            {% else %}
            <span class="badge bg-warning text-dark">Pending</span>
            {% endif %}
        </div>
        <div class="mt-2">
            <a href="{% url 'update_task' task.id %}" class="btn btn-outline-info btn-s, btn-custom">Edit</a>
            <form action="{% url 'delete_task' task.id %}" method="post">
                {% csrf_token %}
                <button class="btn btn-outline-danger btn-sm btn-custom">Delete</button>
            </form>
        </div>

    </div>

    {% empty %}
    <div class="text-center text-muted">No Task added yet</div>
    {% endfor %}

</div>

{% endblock %}
