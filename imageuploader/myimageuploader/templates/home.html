<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Uploader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-5">

    <div class="text-center mb-5">
      <h1 class="fw-bold">Image Gallery</h1>
      <p class="text-muted">Upload and view your images beautifully</p>
    </div>

    <div class="card shadow-sm border-0 mb-5">
      <div class="card-body text-center p-4">
        <h5 class="mb-4">Upload New Image</h5>
        <form action="" method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            {{form}}
          </div>
          <button type="submit" class="btn btn-success px-4">Upload</button>
        </form>
      </div>
    </div>

    <div class="row g-4">
      {% for x in img %}
      <div class="col-md-4 col-sm-6">
        <div class="card border-0 shadow-sm h-100">
          <img src="{{x.photo.url}}" class="card-img-top" style="height: 220px; object-fit: cover;">
          <div class="card-footer">
            <small class="text-muted">{{x.date}}</small>
          </div>
        </div>

      </div>
      {% endfor %}
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
